<div class="crear-container">

  <!-- ================= FORMULARIO IZQUIERDO ================= -->
  <div class="formulario-box">
    <h2>Crear Paciente</h2>

    <form (ngSubmit)="guardarPaciente()" #formPaciente="ngForm">

      <!-- NOMBRE -->
      <label>Nombre completo</label>
      <input
        type="text"
        name="nombre"
        [(ngModel)]="paciente.nombre"
        required
        placeholder="Ingrese el nombre del paciente"
      />

      <!-- TIPO DOCUMENTO -->
      <label>Tipo de documento</label>
      <select
        name="tipoDocumento"
        [(ngModel)]="paciente.tipoDocumento"
        required
      >
        <option value="">Seleccione</option>
        <option value="CC">Cédula de ciudadanía</option>.
        <option value="TI">Tarjeta de identidad</option>
        <option value="CE">Cédula de extranjería</option>
        <option value="PAS">Pasaporte</option>
      </select>

      <div class="form-group">
  <label>Número de Documento</label>
  <input 
    type="text" 
    class="form-control"
    [(ngModel)]="paciente.numeroDocumento"
    name="numeroDocumento"
    required>
</div>


      <!-- TELEFONO -->
      <label>Teléfono</label>
      <input
        type="tel"
        name="telefono"
        [(ngModel)]="paciente.telefono"
        required
        placeholder="Número de contacto"
      />

      <!-- CORREO -->
      <label>Correo electrónico</label>
      <input
        type="email"
        name="correo"
        [(ngModel)]="paciente.correo"
        required
        placeholder="correo@ejemplo.com"
      />

      <!-- OBSERVACIONES -->
      <label>Observaciones</label>
      <textarea
        name="observaciones"
        [(ngModel)]="paciente.observaciones"
        placeholder="Notas adicionales del paciente"
      ></textarea>

      <!-- BOTÓN GUARDAR -->
      <div class="guardar-container">
        <button
          type="submit"
          class="btn-guardar"
          [disabled]="formPaciente.invalid"
        >
          Guardar Paciente
        </button>
      </div>

    </form>
  </div>

  <!-- ================= CÁMARA DERECHA ================= -->
  <div class="camara-box">

    <h3>Fotografía del Paciente</h3>

    <!-- COMPONENTE WEBCAM -->
    <webcam
      [trigger]="triggerObservable"
      (imageCapture)="handleImage($event)">
    </webcam>

    <!-- BOTÓN TOMAR FOTO -->
    <button class="btn-foto" type="button" (click)="triggerSnapshot()">
      📸 Tomar Foto
    </button>

    <!-- VISTA PREVIA -->
    <div class="preview" *ngIf="imagen">
      <p>Vista previa:</p>
      <img [src]="imagen.imageAsDataUrl" alt="Foto del paciente" />
    </div>

  </div>

</div>
